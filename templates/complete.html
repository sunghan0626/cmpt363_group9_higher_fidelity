<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Workout Complete</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globals.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styleguide.css') }}" />
    <script src="{{ url_for('static', filename='js/workout-plan.js') }}"></script>
    <style>
      .frame {
        width: 100%;
        max-width: 402px;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0 auto;
        position: relative;
        background-color: #ffffff;
        border-radius: 44px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding: 0 28px 40px;
      }

      @media (max-width: 420px) {
        .frame {
          border-radius: 0;
          max-width: 100%;
        }
      }

      .status-bar {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 21px 0 19px;
        flex-shrink: 0;
      }

      .time {
        display: flex;
        height: 22px;
        align-items: center;
        justify-content: center;
        padding-top: 1.5px;
        flex: 0 0 auto;
      }

      .text-wrapper {
        font-family: "SF Pro-Semibold", Helvetica;
        font-weight: 400;
        color: #000000;
        font-size: 17px;
        line-height: 22px;
      }

      .levels {
        width: 78px;
        height: 18px;
        object-fit: contain;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .card {
        width: 100%;
        padding: 30px 22px;
        background: #d6e6f5;
        border-radius: 28px;
      }

      .title {
        margin: 0;
        font-family: var(--m3-title-small-emphasized-font-family);
        font-weight: 600;
        font-size: 28px;
        line-height: 32px;
        color: #49454f;
      }

      .description {
        margin: 12px 0 0;
        font-family: var(--m3-body-medium-font-family);
        font-size: 14px;
        line-height: 20px;
        color: #49454f;
      }

      .cta-group {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .primary-btn {
        width: 210px;
        min-height: 41px;
        background-color: #289cff;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-family: "Poppins", Helvetica;
        font-weight: 400;
        color: #ffffff;
        font-size: 24px;
      }

      .secondary-link {
        font-family: var(--m3-body-medium-font-family);
        font-size: 14px;
        color: #289cff;
      }
    </style>
  </head>

  <body>
    <div class="frame">
      <div class="status-bar">
        <div class="time"><div class="text-wrapper">9:41</div></div>
        <img
          class="levels"
          src="{{ url_for('static', filename='images/status-icons.svg') }}"
          alt=""
          aria-hidden="true"
        />
      </div>

      <div class="content">
        <section class="card">
          <h1 class="title">Good Job</h1>
          <p class="description" id="completion-text">
            You completed your personalized workout session for today.
          </p>
        </section>

        <div class="cta-group">
          <button class="primary-btn" type="button" onclick="handleDoAgain()">
            Do it again
          </button>
          <a class="secondary-link" href="workout.html">Back to workout plan</a>
        </div>
      </div>
    </div>

    <script>
      const plan = getOrCreateGeneratedWorkoutPlan();
      document.getElementById("completion-text").textContent =
        `You completed ${plan.title.toLowerCase()} and finished ${plan.exercises.length} exercises today.`;

      function handleDoAgain() {
        resetWorkoutSession(plan);
        window.location.href = "session.html";
      }
    </script>
  </body>
</html>
