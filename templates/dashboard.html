<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Dashboard</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globals.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styleguide.css') }}" />
    <script src="{{ url_for('static', filename='js/workout-plan.js') }}"></script>
    <style>
      .frame {
        width: 100%;
        max-width: 402px;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 44px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      @media (max-width: 420px) {
        .frame {
          border-radius: 0;
          max-width: 100%;
        }
      }

      .status-bar {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 21px 24px 16px;
        flex-shrink: 0;
      }

      .time {
        display: flex;
        height: 22px;
        align-items: center;
        justify-content: center;
        padding-top: 1.5px;
      }

      .text-wrapper {
        font-family: "SF Pro-Semibold", Helvetica;
        font-size: 17px;
        line-height: 22px;
        color: #000000;
      }

      .levels {
        width: 78px;
        height: 18px;
        object-fit: contain;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .top-row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 0 22px 8px;
      }


      .session-strip {
        margin-top: 2px;
        background: #f1f1f1;
        text-align: center;
      }

      .session-label {
        margin: 0;
        padding-top: 2px;
        font-family: "Poppins", Helvetica;
        font-size: 12px;
        font-weight: 600;
        color: #8f8f8f;
      }

      .session-time {
        margin-top: 4px;
        background: #289cff;
        color: #ffffff;
        font-family: "Poppins", Helvetica;
        font-size: 18px;
        font-weight: 700;
        line-height: 32px;
      }

      .preview-area {
        background: #efefef;
        padding: 16px 10px 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: inset 0 -4px 6px rgba(0, 0, 0, 0.08);
      }

      .exercise-row {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        overflow: hidden;
      }

      .exercise-thumb {
        width: 68px;
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      .exercise-thumb img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .start-btn {
        margin-top: 10px;
        min-width: 120px;
        min-height: 34px;
        padding: 0 22px;
        border: none;
        border-radius: 18px;
        background: #289cff;
        color: #ffffff;
        font-family: "Poppins", Helvetica;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
      }

      .timeline-title {
        margin: 18px 0 14px;
        text-align: center;
        font-family: "Protest Riot", Helvetica;
        color: #289cff;
        font-size: 30px;
        font-weight: bold;
        line-height: 1;
      }

      .calendar-card {
        width: calc(100% - 52px);
        max-width: 320px;
        margin: 0 auto;
        padding: 18px 16px 16px;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: inset 0 0 0 1px rgba(198, 198, 198, 0.95);
      }

      .calendar-top {
        display: grid;
        grid-template-columns: 32px 1fr 1fr 32px;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      .calendar-arrow {
        width: 32px;
        height: 32px;
        border: none;
        background: transparent;
        color: #303030;
        font-size: 28px;
        line-height: 1;
        cursor: pointer;
      }

      .calendar-select-wrap {
        position: relative;
        min-height: 34px;
      }

      .calendar-select {
        width: 100%;
        min-height: 34px;
        border-radius: 10px;
        background: #f5f5f5;
        box-shadow: inset 0 0 0 1px rgba(210, 210, 210, 0.95);
        border: none;
        padding: 0 28px 0 12px;
        font-family: "Poppins", Helvetica;
        font-size: 15px;
        color: #4d4d4d;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        outline: none;
        cursor: pointer;
      }

      .calendar-select-arrow {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-family: "Poppins", Helvetica;
        font-size: 14px;
        color: #4d4d4d;
        pointer-events: none;
      }

      .weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }

      .weekdays {
        margin-bottom: 8px;
      }

      .weekday {
        text-align: center;
        font-family: "Poppins", Helvetica;
        font-size: 12px;
        color: #9d9d9d;
      }

      .day {
        height: 38px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Poppins", Helvetica;
        font-size: 14px;
        color: #333333;
        cursor: pointer;
        user-select: none;
        border: 1px solid #d8d8d8;
        background: #ffffff;
      }

      .day--muted {
        color: #bebebe;
        border-color: transparent;
        background: transparent;
      }

      .day--completed {
        background: #c0ddf7;
        border-color: #d8d8d8;
      }

      .day--today {
        background: #289cff;
        color: #ffffff;
        border-color: #289cff;
      }

      .day--selected {
        box-shadow: inset 0 0 0 2px #289cff;
      }

      .bottom-spacer {
        flex: 1;
        min-height: 18px;
      }

      .navbar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: #a8d2f8;
        overflow: hidden;
      }

      .nav-item {
        min-height: 56px;
        border: none;
        background: transparent;
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .nav-item--active {
        background: #289cff;
      }

      .nav-item svg {
        width: 28px;
        height: 28px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>

  <body>
    <div class="frame">
      <div class="status-bar">
        <div class="time"><div class="text-wrapper">9:41</div></div>
        <img
          class="levels"
          src="{{ url_for('static', filename='images/status-icons.svg') }}"
          alt=""
          aria-hidden="true"
        />
      </div>


        <div class="session-strip">
          <p class="session-label">Today's session</p>
          <div class="session-time" id="session-time">25 minutes</div>
        </div>

        <div class="preview-area">
          <div class="exercise-row" id="exercise-row"></div>
          <button class="start-btn" type="button" onclick="window.location.href='workout.html';">
            Start
          </button>
        </div>

        <h1 class="timeline-title">Timeline</h1>

        <section class="calendar-card">
          <div class="calendar-top">
            <button class="calendar-arrow" id="prev-month-btn" type="button" aria-label="Previous month">‹</button>

            <div class="calendar-select-wrap">
              <select class="calendar-select" id="month-select" aria-label="Select month"></select>
              <span class="calendar-select-arrow">⌄</span>
            </div>

            <div class="calendar-select-wrap">
              <select class="calendar-select" id="year-select" aria-label="Select year"></select>
              <span class="calendar-select-arrow">⌄</span>
            </div>

            <button class="calendar-arrow" id="next-month-btn" type="button" aria-label="Next month">›</button>
          </div>

          <div class="weekdays">
            <div class="weekday">Su</div>
            <div class="weekday">Mo</div>
            <div class="weekday">Tu</div>
            <div class="weekday">We</div>
            <div class="weekday">Th</div>
            <div class="weekday">Fr</div>
            <div class="weekday">Sa</div>
          </div>

          <div class="calendar-grid" id="calendar-grid"></div>
        </section>

        <div class="bottom-spacer"></div>

        <div class="navbar">
          <button class="nav-item nav-item--active" type="button" onclick="window.location.href='dashboard.html';">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="8"></circle>
              <path d="M12 8v4l3 2"></path>
            </svg>
          </button>
          <button class="nav-item" type="button" onclick="window.location.href='exercises.html';">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="M20 20l-4-4"></path>
            </svg>
          </button>
          <button class="nav-item" type="button" aria-label="Food page coming soon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 3v7"></path>
              <path d="M10 3v7"></path>
              <path d="M7 7h3"></path>
              <path d="M10 21V10"></path>
              <path d="M17 3c1.5 2 1.5 5 0 7"></path>
              <path d="M17 21V10"></path>
            </svg>
          </button>
          <button class="nav-item" type="button" aria-label="Stats page coming soon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 20h16"></path>
              <path d="M7 16v-4"></path>
              <path d="M12 16V8"></path>
              <path d="M17 16v-6"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      const plan = getOrCreateGeneratedWorkoutPlan();
      const sessionTime = document.getElementById("session-time");
      const exerciseRow = document.getElementById("exercise-row");
      const calendarGrid = document.getElementById("calendar-grid");
      const monthSelect = document.getElementById("month-select");
      const yearSelect = document.getElementById("year-select");
      const prevMonthBtn = document.getElementById("prev-month-btn");
      const nextMonthBtn = document.getElementById("next-month-btn");

      const monthNames = [
        "Jan", "Feb", "Mar", "Apr", "May", "Jun",
        "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
      ];

      const today = new Date();
      let viewYear = today.getFullYear();
      let viewMonth = today.getMonth();
      let selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());

      sessionTime.textContent = `${plan.estimatedSessionMinutes} minutes`;

      plan.exercises.slice(0, 5).forEach((exercise) => {
        const wrapper = document.createElement("div");
        const image = document.createElement("img");

        wrapper.className = "exercise-thumb";
        image.src = getExerciseImageSrc(exercise);
        image.alt = exercise.name;

        wrapper.appendChild(image);
        exerciseRow.appendChild(wrapper);
      });

      function populateMonthOptions() {
        monthSelect.innerHTML = "";
        monthNames.forEach((monthName, index) => {
          const option = document.createElement("option");
          option.value = String(index);
          option.textContent = monthName;
          monthSelect.appendChild(option);
        });
      }

      function populateYearOptions() {
        yearSelect.innerHTML = "";
        const startYear = today.getFullYear() - 5;
        const endYear = today.getFullYear() + 5;

        for (let year = startYear; year <= endYear; year += 1) {
          const option = document.createElement("option");
          option.value = String(year);
          option.textContent = String(year);
          yearSelect.appendChild(option);
        }
      }

      function getCompletedDatesForMonth(year, month) {
        const result = [];
        const spacing = Math.max(2, Math.floor(30 / Math.max(1, plan.totalWorkouts)));
        let day = 2;

        while (day <= 28) {
          result.push(new Date(year, month, day));
          day += spacing;
        }

        return result;
      }

      function isSameDate(a, b) {
        return (
          a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate()
        );
      }

      function syncDropdowns() {
        monthSelect.value = String(viewMonth);
        yearSelect.value = String(viewYear);
      }

      function renderCalendar() {
        calendarGrid.innerHTML = "";
        syncDropdowns();

        const firstDayOfMonth = new Date(viewYear, viewMonth, 1);
        const lastDayOfMonth = new Date(viewYear, viewMonth + 1, 0);
        const daysInMonth = lastDayOfMonth.getDate();
        const startWeekday = firstDayOfMonth.getDay();

        const prevMonthLastDay = new Date(viewYear, viewMonth, 0).getDate();
        const completedDates = getCompletedDatesForMonth(viewYear, viewMonth);

        for (let i = 0; i < startWeekday; i += 1) {
          const dayEl = document.createElement("div");
          dayEl.className = "day day--muted";
          dayEl.textContent = String(prevMonthLastDay - startWeekday + i + 1);
          calendarGrid.appendChild(dayEl);
        }

        for (let day = 1; day <= daysInMonth; day += 1) {
          const currentDate = new Date(viewYear, viewMonth, day);
          const dayEl = document.createElement("button");

          dayEl.type = "button";
          dayEl.className = "day";
          dayEl.textContent = String(day);

          if (completedDates.some((date) => isSameDate(date, currentDate))) {
            dayEl.classList.add("day--completed");
          }

          if (isSameDate(currentDate, today)) {
            dayEl.classList.add("day--today");
          }

          if (isSameDate(currentDate, selectedDate) && !isSameDate(currentDate, today)) {
            dayEl.classList.add("day--selected");
          }

          dayEl.addEventListener("click", () => {
            selectedDate = currentDate;
            renderCalendar();
          });

          calendarGrid.appendChild(dayEl);
        }

        const totalCellsUsed = startWeekday + daysInMonth;
        const trailingCells = totalCellsUsed % 7 === 0 ? 0 : 7 - (totalCellsUsed % 7);

        for (let i = 1; i <= trailingCells; i += 1) {
          const dayEl = document.createElement("div");
          dayEl.className = "day day--muted";
          dayEl.textContent = String(i);
          calendarGrid.appendChild(dayEl);
        }
      }

      prevMonthBtn.addEventListener("click", () => {
        viewMonth -= 1;

        if (viewMonth < 0) {
          viewMonth = 11;
          viewYear -= 1;
        }

        renderCalendar();
      });

      nextMonthBtn.addEventListener("click", () => {
        viewMonth += 1;

        if (viewMonth > 11) {
          viewMonth = 0;
          viewYear += 1;
        }

        renderCalendar();
      });

      monthSelect.addEventListener("change", (event) => {
        viewMonth = Number(event.target.value);
        renderCalendar();
      });

      yearSelect.addEventListener("change", (event) => {
        viewYear = Number(event.target.value);
        renderCalendar();
      });

      populateMonthOptions();
      populateYearOptions();
      renderCalendar();
    </script>
  </body>
</html>
